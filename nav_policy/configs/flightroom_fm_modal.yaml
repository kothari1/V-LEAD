# FlowMatchingPolicy training config — Modal cloud training (A100 40 GB).
#
# Differences from flightroom_fm.yaml (local):
#   - processed_root / checkpoint_dir -> /data/ (Modal Volume mount path)
#   - bucket_sampling: false  (Modal NVMe is fast; true random shuffle)
#   - num_workers: 4          (40+ vCPUs available on A100 instance)
#   - cache_lru_size: 64      (4 workers × 64 × ~14 MB ≈ 3.6 GB, safe on A100)
#
# Run:
#   modal run nav_policy/modal_train.py::main_fm
#   modal run nav_policy/modal_train.py::main_fm --run-tag my_fm_v2

data:
  raw_root: "data/raw"    # relative → resolves via workspace symlink to /raw_data/raw
  processed_root: "/data/processed_flightroom"
  bucket_sampling: false
  cache_blobs_in_memory: false
  cache_lru_size: 64

  train_runs:
    - "flightroom_ssv_exp_2026-05-22_064652_training_mode_shuffled_trajs"
    - "flightroom_ssv_exp_2026-05-22_071718"
    - "flightroom_ssv_exp_2026-05-22_071353"

  val_runs:
    - "flightroom_ssv_exp_2026-05-22_071733_trajs-110"

  test_runs: []

window:
  T: 4
  H: 10
  image_size: 224
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

model:
  resnet_backbone: "resnet18"
  freeze_stem_and_layer1: true
  gru_hidden: 256
  gru_layers: 1
  cmd_dim: 4
  goal_emb_dim: 32
  goal_input_dim: 3
  goal_distance_scale: 5.0

fm:
  n_val_steps: 4
  time_emb_dim: 64
  vf_hidden: [512, 512, 512]
  vf_use_skip: true

train:
  batch_size: 128
  num_workers: 4
  epochs: 10
  color_jitter: true
  lr: 3.0e-4
  weight_decay: 1.0e-4
  amp: true
  grad_clip: 1.0
  log_every: 50
  checkpoint_dir: "/data/checkpoints_flightroom_fm"
  run_tag: "flightroom_fm_modal_v1"
  early_stopping_patience: 3
  seed: 0

wandb:
  enabled: true
  project: vlead-fm
  run_name: null
