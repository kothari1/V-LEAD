# nav_policy flightroom configuration.
#
# Uses the V-LEAD flightroom dataset (new format: flat-list .pt files with
# pre-computed heading_vec / dist / goal_xy from CLIP semantic targeting).
#
# Run assignment is EXPLICIT (no random split):
#   train_runs -> all windows go to split='train'
#   val_runs   -> all windows go to split='val'  (held out entirely)
#   test_runs  -> NOT processed; used only by eval_closed_loop_test.yaml

data:
  raw_root: "data/raw"
  processed_root: "data/processed_flightroom"
  cache_blobs_in_memory: false
  cache_lru_size: 128

  # Training data: short 2-second domain-randomised segments + two full-rollout runs.
  train_runs:
    - "flightroom_ssv_exp_2026-05-22_064652_training_mode_shuffled_trajs"
    - "flightroom_ssv_exp_2026-05-22_071718"
    - "flightroom_ssv_exp_2026-05-22_071353"

  # Validation data: held entirely out from training.
  # Full spawn-to-goal rollouts (~13 s each) across all 5 semantic queries.
  val_runs:
    - "flightroom_ssv_exp_2026-05-22_071733_trajs-110"

  # Test set: never processed for training.  Referenced by eval_closed_loop_test.yaml.
  # These are original SINGER-format backroom / packardpark experiments.
  test_runs:
    - "backroom_exp_04-29-26"
    - "packardpark_exp_04-29-26"

window:
  T: 4           # frame history length (input)
  H: 10          # command horizon (output)
  image_size: 224
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

model:
  resnet_backbone: "resnet18"
  freeze_stem_and_layer1: true
  gru_hidden: 256
  gru_layers: 1
  mlp_hidden: [256, 128]
  cmd_dim: 4
  goal_emb_dim: 32
  goal_input_dim: 3       # [hx, hy, d_normalized]
  goal_distance_scale: 5.0
  mlp_dropout: 0.1

train:
  batch_size: 128
  num_workers: 0
  epochs: 10
  color_jitter: true
  lr: 6.0e-4
  weight_decay: 1.0e-4
  lambda_smooth: 0.05
  amp: true
  grad_clip: 1.0
  checkpoint_dir: "data/checkpoints_flightroom"
  log_every: 50
  val_every_epoch: 1
  seed: 0
