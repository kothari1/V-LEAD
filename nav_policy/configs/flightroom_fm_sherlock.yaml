# FlowMatchingPolicy training config — Stanford Sherlock HPC.
#
# SETUP (one-time, on Sherlock):
#   cd $SCRATCH
#   git clone <V-LEAD repo>
#   cd V-LEAD/nav_policy
#   pip install --user -e ".[wandb]"
#
# DATA SETUP (one-time):
#   sbatch scripts/sherlock_build_dataset.sbatch   # downloads + processes raw data
#
# TRAINING:
#   sbatch scripts/sherlock_train_fm.sbatch
#
# Paths use $SCRATCH which expands to /scratch/users/<sunetid>
# Update the paths below to match your Sherlock username / data layout.

data:
  raw_root: "/scratch/users/YOUR_SUNETID/vlead_data/raw"
  processed_root: "/scratch/users/YOUR_SUNETID/vlead_data/processed_flightroom"
  bucket_sampling: false      # $SCRATCH is fast NVMe on Sherlock
  cache_blobs_in_memory: false
  cache_lru_size: 128

  train_runs:
    - "flightroom_ssv_exp_2026-05-22_064652_training_mode_shuffled_trajs"
    - "flightroom_ssv_exp_2026-05-22_071718"
    - "flightroom_ssv_exp_2026-05-22_071353"

  val_runs:
    - "flightroom_ssv_exp_2026-05-22_071733_trajs-110"

  test_runs: []

window:
  T: 4
  H: 10
  image_size: 224
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

model:
  resnet_backbone: "resnet18"
  freeze_stem_and_layer1: true
  gru_hidden: 256
  gru_layers: 1
  cmd_dim: 4
  goal_emb_dim: 32
  goal_input_dim: 3
  goal_distance_scale: 5.0

fm:
  n_val_steps: 4
  time_emb_dim: 64
  vf_hidden: [512, 512, 512]
  vf_use_skip: true

train:
  batch_size: 128
  num_workers: 4
  epochs: 10
  color_jitter: true
  lr: 3.0e-4
  weight_decay: 1.0e-4
  amp: true
  grad_clip: 1.0
  log_every: 50
  checkpoint_dir: "/scratch/users/YOUR_SUNETID/vlead_data/checkpoints_fm"
  run_tag: "flightroom_fm_sherlock_v1"
  early_stopping_patience: 3
  seed: 0

wandb:
  enabled: true
  project: vlead-fm
  run_name: null
