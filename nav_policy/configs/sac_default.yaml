# SAC training scaffold for the V-LEAD pilot network.
# Single FigsDroneEnv instance, SB3 SAC with BC-encoder feature extractor.

seed: 0
output_dir: data/rl_runs/sac_default
total_timesteps: 100000
log_interval: 4

env:
  scene_name: "flightroom_ssv_exp/gemsplat/2026-02-28_205058"
  rollout_name: "baseline"
  frame_name: "carl"
  hz: 20
  frame_window: 4
  img_resolution: [224, 224]
  goal_distance_scale: 5.0
  goal_input_dim: 4              # [hx, hy, hz, d/scale]; set 3 to drop hz
  # Tightened vz range (-0.5/+0.5 m/s) to dampen vertical exploration at init;
  # ceiling at z=-1.95 m is only ~0.35 m above default start altitude, so wide
  # vz exploration crashes through it in ~30 steps.
  action_low: [-3.0, -3.0, -0.5, -1.5]
  action_high: [3.0, 3.0, 0.5, 1.5]

# Scene bbox from SINGER/configs/scenes/flightroom_ssv_exp.yml:
#   minbound: [-3.7, -8, -2]
#   maxbound: [ 3.7,  8,  0]
# NED convention: z increases downward. z=0 is floor, z=-2 is ceiling.
# Sampler gets a slightly shrunk bbox so spawned goals stay safely inside.
sampler:
  start_xyz_low: [-1.0, -1.0, -1.6]
  start_xyz_high: [1.0, 1.0, -1.0]
  goal_radius_min: 1.5
  goal_radius_max: 5.0
  goal_z_low: -1.7
  goal_z_high: -0.5
  yaw_jitter: 0.0
  velocity_jitter: 0.0
  bbox_xyz_low: [-3.4, -7.7, -1.9]
  bbox_xyz_high: [3.4, 7.7, -0.15]

reward:
  w_progress: 1.0
  w_success: 50.0
  w_alive: 0.01
  w_crash: 50.0
  w_smooth: 0.05
  w_yaw: 0.05
  w_altitude: 0.50
  w_speedcap: 0.10
  alt_target: -1.2
  speed_cap: 3.0
  success_radius: 0.5

termination:
  success_radius: 0.5
  max_episode_steps: 300         # 15 s @ 20 Hz
  # Hard scene bbox (matches flightroom maxbound/minbound exactly).
  bbox_xyz_low: [-3.7, -8.0, -2.0]
  bbox_xyz_high: [3.7, 8.0, 0.0]
  ground_z: -0.05                # NED: crash if pz > -0.05 m (within 5 cm of floor)
  ceiling_z: -1.95               # crash if pz < -1.95 m (within 5 cm of ceiling)
  speed_kill: 5.0

model:
  T: 4
  H_pred: 10
  cmd_dim: 4
  gru_hidden: 256
  gru_layers: 1
  mlp_hidden: [256, 128]
  goal_emb_dim: 32
  freeze_visual: true
  actor_mlp: [256, 128]
  critic_mlp: [256, 128]

sac:
  learning_rate: 3.0e-4
  # Replay buffer RAM = buffer_size * frame_window * 3 * H * W bytes (uint8).
  # At T=4, 224x224: 5000 -> ~3 GB, 20000 -> ~12 GB, 50000 -> ~30 GB.
  # Container shm_size is 12 GB. Keep buffer_size * obs_bytes < shm to avoid hangs.
  buffer_size: 5000
  learning_starts: 500
  batch_size: 64
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  target_update_interval: 1

warm_start:
  bc_checkpoint: /project/kothari1/vlead_data/checkpoints/bc_best.pt
  # If true, copies BC head's Linear layers into SAC actor.latent_pi + actor.mu
  # so the actor's initial action mean matches BC's t=0 velocity command (not
  # just the encoder). Requires model.actor_mlp == BC config's mlp_hidden.
  init_actor_from_bc_head: true

callbacks:
  eval:
    enabled: true
    freq: 2500                   # eval every N env steps
    n_episodes: 3
    seed: 42
  checkpoint:
    enabled: true
    freq: 5000
  reward_components:
    enabled: true
    log_freq: 200
  wandb:
    enabled: false               # set true to mirror logs to W&B
    project: vlead-sac
    run_name: null               # defaults to timestamp if null
    log_freq: 200

# Optional eval-env sampler overrides (uses train sampler if absent).
# eval:
#   sampler:
#     goal_radius_min: 2.0
#     goal_radius_max: 2.5
