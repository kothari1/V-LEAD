# configs/eval_closed_loop.yaml -- closed-loop FiGS evaluation of a trained policy.
#
# REQUIRES: a 3DGS scene checkpoint that figs.simulator.Simulator can load
# via the `scene` string below. Without the splat on disk this script will
# fail at sim = Simulator(scene, ...).

checkpoint: data/checkpoints/bc_best.pt
output_dir: data/eval/bc_v1

# Inner-loop velocity controller gains and frame.
frame: carl
Kv: 2.0
Ka: 5.0

# Each entry runs one closed-loop rollout. `setup_from` supplies (t0, x0, course)
# and the expert reference trajectory used for tracking metrics.
rollouts:
  - name: backroom_00_sub0
    scene: backroom          # 3DGS scene name in your FiGS data root
    rollout: baseline        # rollout config (e.g. configs/rollout/baseline.json)
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 0

  - name: backroom_00_sub2
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 2

  - name: packardpark_00_sub0
    scene: packardpark
    rollout: baseline
    setup_from: data/raw/packardpark_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 0
