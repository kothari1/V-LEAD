# Minimal smoke test for FlowMatchingPolicy — 1 epoch, small batch.
# Checks that the full training + val + checkpoint loop runs without errors.
#
# Run:
#   python scripts/train_fm.py --config configs/smoke_fm.yaml

data:
  raw_root: "data/raw"
  processed_root: "data/processed_flightroom"
  bucket_sampling: false
  cache_blobs_in_memory: false
  cache_lru_size: 8

  train_runs:
    - "flightroom_ssv_exp_2026-05-22_071733_trajs-110"

  val_runs:
    - "flightroom_ssv_exp_2026-05-22_071733_trajs-110"

window:
  T: 4
  H: 10
  image_size: 224
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

model:
  freeze_stem_and_layer1: true
  gru_hidden: 256
  gru_layers: 1
  cmd_dim: 4
  goal_emb_dim: 32
  goal_input_dim: 3
  goal_distance_scale: 5.0

fm:
  n_val_steps: 2
  time_emb_dim: 64
  vf_hidden: [256, 256]      # smaller for speed
  vf_use_skip: true

train:
  batch_size: 4
  num_workers: 0
  epochs: 1
  color_jitter: false
  lr: 3.0e-4
  weight_decay: 1.0e-4
  amp: false
  grad_clip: 1.0
  log_every: 1
  checkpoint_dir: "data/checkpoints_smoke_fm"
  run_tag: "smoke_fm"
  early_stopping_patience: 0
  seed: 0

wandb:
  enabled: false
