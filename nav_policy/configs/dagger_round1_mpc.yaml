# configs/dagger_round1_mpc.yaml -- DAgger round 1 with proper MPC re-solve.
#
# This is the canonical DAgger oracle (Ross et al. 2011): at each policy-
# visited state we re-solve the FiGS VehicleRateMPC starting from the
# policy's actual position and read the planned next-step velocity + yaw
# rate as the label.  Unlike the 'reference' oracle (dagger_round1.yaml),
# this provides drift correction so the policy can learn how to RECOVER,
# not just track.
#
# Cost: roughly one ACADOS SQP solve per policy step (~30-50 ms on the
# laptop).  Expected wall-clock per rollout: a few extra seconds beyond
# the 'reference' oracle baseline.
#
# Flow:
#   1. Load the current BC checkpoint.
#   2. Run the policy in FiGS on each rollout setup below.
#   3. For each policy step, re-solve the MPC at (Tpol[k], Xpol[:, k]) and
#      label the cache with the planned next-step velocity + yaw rate.
#   4. Append new windows to data/processed/manifest.json with round=1 and
#      meta["oracle"]="mpc" so the collector can distinguish them later.

base_config: configs/flightroom.yaml
checkpoint: data/checkpoints_modal/bc_best.pt
round: 1
output_run: dagger_r1_mpc
run_tag: dagger_r1_mpc

oracle: mpc           # 'reference' (legacy) | 'mpc' (proper DAgger)
mpc_policy: vrmpc_rrt # FiGS configs/policy/{}.json -- match the original expert
frame: carl
Kv: 2.0
Ka: 5.0
split_assignment: train

rollouts:
  # ---- backroom scene: stack 0, all 4 sub-trajectories ----
  - name: backroom_00_sub0
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 0

  - name: backroom_00_sub1
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 1

  - name: backroom_00_sub2
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 2

  - name: backroom_00_sub3
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 3

  # ---- backroom scene: stack 1, all 4 sub-trajectories ----
  - name: backroom_01_sub0
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00001.pt
    sub_idx: 0

  - name: backroom_01_sub1
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00001.pt
    sub_idx: 1

  - name: backroom_01_sub2
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00001.pt
    sub_idx: 2

  - name: backroom_01_sub3
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00001.pt
    sub_idx: 3

  # ---- packardpark scene: stack 0, all 4 sub-trajectories ----
  - name: packardpark_00_sub0
    scene: packardpark
    rollout: baseline
    setup_from: data/raw/packardpark_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 0

  - name: packardpark_00_sub1
    scene: packardpark
    rollout: baseline
    setup_from: data/raw/packardpark_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 1

  - name: packardpark_00_sub2
    scene: packardpark
    rollout: baseline
    setup_from: data/raw/packardpark_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 2

  - name: packardpark_00_sub3
    scene: packardpark
    rollout: baseline
    setup_from: data/raw/packardpark_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 3
