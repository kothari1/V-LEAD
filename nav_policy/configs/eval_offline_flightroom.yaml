# Offline evaluation on the flightroom validation set.
# checkpoint is passed via --checkpoint CLI arg (not read from config here).
# offline.py reads cfg["data"]["processed_root"] and cfg["train"]["batch_size"].

data:
  processed_root: "data/processed_flightroom"
  cache_blobs_in_memory: false
  cache_lru_size: 128

train:
  batch_size: 128