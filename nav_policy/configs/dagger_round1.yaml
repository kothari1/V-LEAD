# configs/dagger_round1.yaml -- one round of DAgger relabel + cache append.
#
# Flow:
#   1. Load the current best BC checkpoint.
#   2. Run the policy in FiGS on each rollout setup below.
#   3. Relabel every policy-visited control step with the expert's
#      time-aligned state-trajectory velocity / yaw-rate.
#   4. Append new windows to data/processed/manifest.json with round=1.
#
# Assumed workflow (each step keeps its own checkpoint folder so the
# ablation table can later cite all three):
#   1. python scripts/train_bc.py --config configs/default.yaml \
#        --checkpoint-dir data/checkpoints_bc --run-tag bc_round0
#   2. python scripts/run_dagger.py  --config configs/dagger_round1.yaml
#   3. python scripts/train_bc.py    --config configs/default.yaml \
#        --checkpoint-dir data/checkpoints_dagger_r1 --run-tag dagger_r1

base_config: configs/default.yaml
checkpoint: data/checkpoints_bc/bc_best.pt    # produced by step 1 above
round: 1
output_run: dagger_r1

frame: carl
Kv: 2.0
Ka: 5.0
split_assignment: train         # new DAgger windows go to the train split

rollouts:
  - name: backroom_00_sub0
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 0

  - name: backroom_00_sub2
    scene: backroom
    rollout: baseline
    setup_from: data/raw/backroom_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 2

  - name: packardpark_00_sub0
    scene: packardpark
    rollout: baseline
    setup_from: data/raw/packardpark_exp_04-29-26/trajectories_val00000.pt
    sub_idx: 0
